name: Build and Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'server/**'
      - 'client/**'
      - 'k8s/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: apexpos-backend
  FRONTEND_IMAGE_NAME: apexpos-frontend
  EC2_HOST: 13.235.9.45
  EC2_USER: ubuntu
  NAMESPACE: apexpos

jobs:
  # Lint & Build Frontend React Client
  lint-client:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

      - name: Build production bundle
        run: npm run build
        working-directory: client

  # Validate Express Backend API
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Check JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          find . -name '*.js' -not -path './node_modules/*' | while read f; do
            node --check "$f" || exit 1
          done
          echo "All JS files passed syntax check"
        working-directory: server

      - name: Run tests
        run: npm test --if-present || echo "No tests configured yet"
        working-directory: server
        continue-on-error: true

  # Build & Push Backend Docker Image
  build-push-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Owner for GHCR
        id: owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build & Push Frontend Docker Image
  build-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    needs: lint-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Owner for GHCR
        id: owner
        run: echo "owner=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to EC2 k3s cluster
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Rolling out deployments to pull latest images..."
            sudo kubectl rollout restart deployment/apexpos-backend -n ${{ env.NAMESPACE }}
            sudo kubectl rollout restart deployment/apexpos-frontend -n ${{ env.NAMESPACE }}
            
            echo "Waiting for rollout to complete..."
            sudo kubectl rollout status deployment/apexpos-backend -n ${{ env.NAMESPACE }} --timeout=180s
            sudo kubectl rollout status deployment/apexpos-frontend -n ${{ env.NAMESPACE }} --timeout=180s
            echo "Deployment rollout success."

      - name: Backend health check
        run: |
          echo "Checking backend health endpoint..."
          sleep 15
          curl -f --retry 5 --retry-delay 5 http://${{ env.EC2_HOST }}:30500/ || exit 1
          echo "Backend service is healthy."

      - name: Frontend health check
        run: |
          echo "Checking frontend health endpoint..."
          curl -f --retry 5 --retry-delay 5 http://${{ env.EC2_HOST }}:30080/ || exit 1
          echo "Frontend service is healthy."

  # Notify deployment status
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-push-backend, build-push-frontend, deploy]
    if: always()
    steps:
      - name: Check pipeline result
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "Deployment succeeded."
            echo "Frontend URL: http://${{ env.EC2_HOST }}:30080"
            echo "Backend URL: http://${{ env.EC2_HOST }}:30500"
          else
            echo "Deployment failed."
            exit 1
          fi
