---
- name: Install Jenkins (Lightweight)
  hosts: all
  become: yes
  tasks:
    - name: Remove old Jenkins repository file
      file:
        path: /etc/apt/sources.list.d/jenkins.list
        state: absent

    - name: Install Jenkins GPG key (2026 version)
      shell: curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key | sudo tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null

    - name: Add Jenkins repository to sources list
      copy:
        dest: /etc/apt/sources.list.d/jenkins.list
        content: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install OpenJDK 21 and Jenkins
      apt:
        name: 
          - openjdk-21-jre-headless
          - jenkins
        update_cache: yes
        state: present

    - name: Create Jenkins systemd override directory
      file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory

    - name: Set Jenkins memory limits via systemd override
      copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        content: |
          [Service]
          Environment="JAVA_OPTS=-Xmx128m -Djava.awt.headless=true"
      notify: 
        - reload systemd
        - restart jenkins

    - name: Force systemd daemon-reload
      command: systemctl daemon-reload

    - name: Start Jenkins
      systemd:
        name: jenkins
        state: started
        enabled: yes
      ignore_errors: yes
      register: jenkins_start

    - name: Fetch Jenkins logs on failure
      command: journalctl -xeu jenkins --no-pager -n 50
      when: jenkins_start.failed
      register: jenkins_logs

    - name: Display Jenkins logs on failure
      debug:
        var: jenkins_logs.stdout_lines
      when: jenkins_start.failed

    - name: Fail if Jenkins could not start
      fail:
        msg: "Jenkins failed to start. Check the logs above."
      when: jenkins_start.failed

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart jenkins
      systemd:
        name: jenkins
        state: restarted
