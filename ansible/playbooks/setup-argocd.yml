---
- name: Install Argo CD on k3s
  hosts: all
  become: no
  tasks:
    - name: Temporarily stop unnecessary services to free up RAM
      become: yes
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - jenkins
        - docker

    - name: Restart k3s to ensure a fresh state
      become: yes
      systemd:
        name: k3s
        state: restarted

    - name: Wait for k3s to settle
      pause:
        seconds: 20

    - name: Create massive 8GB swap space for installation headroom
      become: yes
      shell: |
        if [ ! -f /swapfile8g ]; then
          fallocate -l 8G /swapfile8g
          chmod 600 /swapfile8g
          mkswap /swapfile8g
          swapon /swapfile8g
        fi
      args:
        creates: /swapfile8g

    - name: Create namespace for Argo CD (idempotent)
      shell: kubectl get namespace argocd || kubectl create namespace argocd
      register: ns_result
      changed_when: "'created' in ns_result.stdout"

    - name: Download Argo CD manifest to local disk
      get_url:
        url: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        dest: /tmp/argocd-install.yaml

    - name: Install Argo CD from local file (Server-side apply)
      command: kubectl apply --server-side --force-conflicts --request-timeout=10m -n argocd -f /tmp/argocd-install.yaml

    - name: Restart services
      become: yes
      systemd:
        name: "{{ item }}"
        state: started
      loop:
        - docker
        - jenkins

    - name: Install Argo CD CLI
      become: yes
      get_url:
        url: https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        dest: /usr/local/bin/argocd
        mode: '0755'
