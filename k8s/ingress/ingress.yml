apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apexpos-ingress
  namespace: apexpos
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: "apexpos-backend-svc"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ntharusha.com # Placeholder based on user name
      secretName: apexpos-tls
  rules:
    - host: api.ntharusha.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apexpos-backend-svc
                port:
                  number: 5000
