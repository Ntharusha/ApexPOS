apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: apexpos
data:
  PORT: "5000"
  NODE_ENV: "production"
  # Allow local dev + EC2 NodePort access + Vercel frontend
  ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://YOUR_EC2_IP,http://YOUR_EC2_IP:30500,https://apexpos.vercel.app" # Update YOUR_EC2_IP before deploy
