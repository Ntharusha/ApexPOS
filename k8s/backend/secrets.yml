apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: apexpos
type: kubernetes.io/dockercfg
data:
  .dockercfg: eyJkb2NrZXIuaW8iOiB7ImF1dGgiOiAiYmFzZTY0X2VuY29kZWRfY3JlZHMifX0=
