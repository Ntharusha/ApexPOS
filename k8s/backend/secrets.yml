apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: apexpos
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://username:password@cluster.mongodb.net/apexpos?retryWrites=true&w=majority"
  JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
